name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
      placeholder: Describe the proposed feature or improvement.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, references, or other details if helpful
    validations:
      required: false
