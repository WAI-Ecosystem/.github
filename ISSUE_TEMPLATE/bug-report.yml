name: Bug Report
description: Report a reproducible bug or broken behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps to reproduce the issue
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Add any useful screenshots, logs, or error messages
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, or runtime
      placeholder: Chrome 123 / Ubuntu 22.04 / iPhone 15 / Node 20
    validations:
      required: false
